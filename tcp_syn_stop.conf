# IPRULES SYN FLOOD TRACKING AND AVOIDING
table inet filter {
    # 1. The Whitelist: IPs and subnets that bypass all limits.
    # Elements are automatically synced by the tcp_syn_stop.py daemon.
    set trusted_sources {
        type ipv4_addr
        flags interval
        auto-merge
    }

    # 1.5. The Blacklist: IPs and subnets to drop immediately on all protocols.
    # Elements are automatically synced by the tcp_syn_stop.py daemon.
    set blacklisted_sources {
        type ipv4_addr
        flags interval
        auto-merge
    }

    # 2. The Dynamic State Table: Tracks TCP SYN rates per unknown IP
    set syn_trackers {
        type ipv4_addr
        flags dynamic, timeout
        timeout 60s
        size 100000
    }

    # 2.5 The UDP State Table: Tracks UDP packet rates per unknown IP
    set udp_trackers {
        type ipv4_addr
        flags dynamic, timeout
        timeout 60s
        size 100000
    }

    # 3. The set of IP addresses failing the handshake (spoofed victims)
    set reflection_targets {
        type ipv4_addr
        flags dynamic, timeout
        timeout 1h
        size 100000
    }

    # 4. Tracks STUN destination IPs to enforce per-server rate caps.
    # Keyed by the remote STUN server address so multiple servers don't share one budget.
    set stun_trackers {
        type ipv4_addr
        flags dynamic, timeout
        timeout 10s
        size 10000
    }

    chain input {
        type filter hook input priority 0; policy accept;

        # Fast path: Immediately drop statically blacklisted sources
        ip saddr @blacklisted_sources drop

        # Fast path: Immediately accept established and related traffic
        # This saves CPU cycles by bypassing the tracker for existing connections.
        ct state established,related accept

        # Fast path: Immediately accept trusted infrastructure
        ip saddr @trusted_sources accept

        # ── TOR RELAY INBOUND BLOCK ─────────────────────────────────────────────
        # Drop inbound connections attempting to reach standard Tor relay ports.
        # Prevents the server from being registered as a reachable Tor node.
        tcp dport { 9001, 9030 } log prefix "TOR_INBOUND: " level warn counter drop
        # ── END TOR RELAY INBOUND BLOCK ─────────────────────────────────────────

        # --- TCP SYN FLOOD PROTECTION ---
        # Only evaluate new TCP connections (SYN packets).
        # Dynamic rate limiting per source IP. Burst increased to 100 to accommodate
        # multiple legitimate Outline clients behind CGNAT.
        tcp flags syn / fin,syn,rst,ack add @syn_trackers { ip saddr limit rate over 20/second burst 100 packets } log prefix "TCP_SYN_FLOOD_DROP: " level info drop

        # --- UDP FLOOD PROTECTION (Outline VPN on port 443) ---
        # Outline uses UDP for QUIC/WebRTC traffic. Attackers often flood this to exhaust decryption threads.
        # Since established UDP flows bypass this (caught by 'ct state established' above),
        # this only limits *new* or *untracked* UDP packets hitting the VPN port.
        # Limit new UDP packets from a single unknown IP to 50/sec with a burst of 100.
        # This is generous enough for a new Outline connection but stops volumetric garbage floods.
        udp dport 443 add @udp_trackers { ip saddr limit rate over 50/second burst 100 packets } log prefix "UDP_VPN_FLOOD_DROP: " level info drop
    }

    chain output {
        type filter hook output priority 0; policy accept;

        # Fast path: Immediately accept trusted infrastructure
        ip daddr @trusted_sources accept

        # ── TUNNEL LEAK DETECTION (LOG ONLY) ───────────────────────────────────
        # Fingerprint WireGuard and ZeroTier traffic leaving via the Outline proxy.
        # No traffic is dropped — rules emit kernel log entries for investigation.
        # To harden any rule to block: add `drop` after `counter`.

        # WireGuard Handshake Initiator (type=1, LE uint32):
        #   UDP payload bytes [0..3] = 0x01 0x00 0x00 0x00
        #   UDP total length = 148 bytes (8 header + 140 payload — fixed by spec)
        ip protocol udp udp length 148 @th,64,32 0x01000000 \
            log prefix "WG_INIT: " level warn counter

        # WireGuard Handshake Responder (type=2):
        #   UDP total length = 92 bytes (8 header + 84 payload — fixed by spec)
        ip protocol udp udp length 92 @th,64,32 0x02000000 \
            log prefix "WG_RESP: " level warn counter

        # WireGuard default port — belt-and-suspenders for default WG configs.
        udp dport 51820 log prefix "WG_PORT: " level warn counter

        # ZeroTier planet/moon server port.
        # Without reaching a planet on 9993, ZeroTier cannot discover any peers.
        meta l4proto { tcp, udp } th dport 9993 \
            log prefix "ZT_SEEN: " level warn counter

        # STUN excess logger — normal WebRTC stays under 15/s burst 30 per server.
        # STUN Binding Request: message type 0x0001, magic cookie 0x2112A442 (RFC 5389).
        # Only the packets ABOVE the rate cap are logged (the burst absorbs legitimate calls).
        ip protocol udp @th,64,16 0x0001 @th,96,32 0x2112A442 \
            add @stun_trackers { ip daddr limit rate over 15/second burst 30 packets } \
            log prefix "STUN_EXCESS: " level info counter
        # ── END TUNNEL LEAK DETECTION ──────────────────────────────────────────

        # ── TOR NODE ENFORCEMENT (DROP) ────────────────────────────────────────
        # Block outbound connections to Tor infrastructure.
        # A Tor circuit cannot form without first connecting to a guard on ORPort
        # (9001) and fetching the directory consensus via DirPort (9030).
        # Blocking these two ports cuts bootstrap entirely, regardless of which
        # guard IP is used. Ports 9050/9051/9150 are belt-and-suspenders for
        # Tor daemons or Tor Browser SOCKS ports reachable via the proxy.
        tcp dport { 9001, 9030 } log prefix "TOR_RELAY: " level warn counter drop
        tcp dport { 9050, 9051, 9150 } log prefix "TOR_LOCAL: " level warn counter drop
        # ── END TOR NODE ENFORCEMENT ────────────────────────────────────────────

        # Match outgoing SYN-ACK packets (Server replying to a SYN).
        # A normal handshake has 1 SYN-ACK.
        # If we send more than 1 per 5 seconds to the same IP, it is a kernel retransmission
        # trying to reach a spoofed victim.
        # We add/update the destination IP in our set, log it, and drop the retransmission.
        tcp flags syn,ack / fin,syn,rst,ack update @reflection_targets { ip daddr limit rate over 12/minute } log prefix "SPOOFED_REFLECTOR_TARGET: " level info drop
    }
}
